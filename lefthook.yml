# Local shift-left mirror of what CI enforces (ci.yml, pr-guards.yml) — catches
# the same issues before push instead of after. Install with `lefthook install`
# (installed via macos/Brewfile's `lefthook` formula).
pre-commit:
  jobs:
    - name: zsh-syntax
      glob:
        - "zsh/.zshenv"
        - "zsh/.zshrc"
        - "zsh/rc.d/**"
        - "zsh/env.d/**"
        - "zsh/fpath/**"
        - "macos/deploy.zsh"
      run: zsh -n {staged_files}

    - name: shellcheck
      glob: "linux/*.sh"
      run: shellcheck {staged_files}

    - name: actionlint
      glob:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
      run: actionlint {staged_files}

    - name: envrc-local-example-sync
      run: scripts/check-envrc-local-example.sh

pre-push:
  jobs:
    - name: envrc-local-example-sync
      run: scripts/check-envrc-local-example.sh
