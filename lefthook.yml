# Local shift-left mirror of what CI enforces (ci.yml, pr-guards.yml) — catches
# the same issues before push instead of after. Install with `lefthook install`
# (installed via macos/Brewfile's `lefthook` formula).
pre-commit:
  jobs:
    - name: zsh-syntax
      glob:
        - "zsh/.zshenv"
        - "zsh/.zshrc"
        - "zsh/rc.d/**"
        - "zsh/env.d/**"
        - "zsh/fpath/**"
        - "macos/deploy.zsh"
      run: zsh -n {staged_files}

    - name: shellcheck
      glob:
        - "linux/*.sh"
        - "scripts/*.sh"
        - "claude/skills/**/*.sh"
        - ".envrc"
        - ".envrc.local.example"
      run: shellcheck {staged_files}

    - name: shfmt
      glob:
        - "linux/*.sh"
        - "scripts/*.sh"
        - "claude/skills/**/*.sh"
      run: shfmt -i 2 -ci -d {staged_files}

    - name: actionlint
      glob:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
      run: actionlint {staged_files}

    - name: lua-format
      glob:
        - "nvim/*.lua"
        - "nvim/**/*.lua"
      run: stylua --check {staged_files}

    - name: lua-lint
      glob:
        - "nvim/*.lua"
        - "nvim/**/*.lua"
      run: selene --config nvim/selene.toml {staged_files}

    - name: toml-format
      glob:
        - "*.toml"
        - "nvim/*.toml"
      run: taplo fmt --check {staged_files}

    - name: toml-lint
      glob:
        - "*.toml"
        - "nvim/*.toml"
      run: taplo lint {staged_files}

    - name: yaml-format
      glob:
        - ".github/dependabot.yml"
        - ".markdownlint-cli2.yaml"
        - "lefthook.yml"
      run: yamlfmt -lint {staged_files}

    - name: markdownlint
      glob:
        - "*.md"
        - "**/*.md"
      exclude:
        - "CHANGELOG.md"
        - ".claude/agent-memory/**"
      run: markdownlint-cli2 {staged_files}

    - name: md-format
      glob:
        - "*.md"
        - "**/*.md"
      exclude:
        - "CHANGELOG.md"
        - ".claude/agent-memory/**"
      run: prettier --check {staged_files}

    - name: envrc-local-example-sync
      run: scripts/check-envrc-local-example.sh

    # Raw jinja syntax check — cheap, catches broken jinja before render.
    # Filtering (by .jinja extension, and excluding two known
    # j2lint-false-positive files) lives in the script, not lefthook's own
    # `exclude:` — this lefthook version doesn't apply `exclude` reliably
    # across multiple `glob` entries, so glob stays broad and the script is
    # the single source of truth for what actually gets linted. See its
    # header for why those two files are excluded, and its render-then-lint
    # pass (pre-push, below) for what actually validates them.
    - name: j2lint
      glob:
        - "git-flow/template/**"
        - "python/template/**"
      run: scripts/lint-templates.sh --jinja {staged_files}

pre-push:
  jobs:
    - name: envrc-local-example-sync
      run: scripts/check-envrc-local-example.sh

    # Render-then-lint — heavier (a full copier render + uv sync per
    # template), so pre-push rather than pre-commit; CI runs the same
    # `just lint-templates` entry point (ci.yml's lint-templates job).
    - name: lint-templates
      glob:
        - "git-flow/**"
        - "python/**"
      run: just lint-templates
