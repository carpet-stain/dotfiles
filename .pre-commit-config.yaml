# Local shift-left mirror of what CI enforces (ci.yml, pr-title.yml) — catches
# the same issues before push instead of after. Install with `pre-commit
# install` (installed via macos/Brewfile's `pre-commit` formula).

repos:
  - repo: local
    hooks:
      - id: zsh-syntax
        name: zsh syntax check
        description: Same check as ci.yml's zsh-syntax job, run locally.
        entry: zsh -n
        language: system
        files: ^(zsh/\.zshenv|zsh/\.zshrc|zsh/(rc\.d|env\.d|fpath)/.*|macos/deploy\.zsh)$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^linux/.*\.sh$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
