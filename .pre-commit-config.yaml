# Local shift-left mirror of what CI enforces (ci.yml, pr-guards.yml) — catches
# the same issues before push instead of after. Install with `pre-commit
# install` (installed via macos/Brewfile's `pre-commit` formula); a single
# install covers both hook types listed below.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: zsh-syntax
        name: zsh syntax check
        description: Same check as ci.yml's zsh-syntax job, run locally.
        entry: zsh -n
        language: system
        files: ^(zsh/\.zshenv|zsh/\.zshrc|zsh/(rc\.d|env\.d|fpath)/.*|macos/deploy\.zsh)$

      - id: envrc-local-example-sync
        name: .envrc.local.example matches .envrc.local (credentials scrubbed)
        description: >
          Blocks a real-looking credential from ever landing in the
          tracked template, and keeps the template from silently drifting
          from what .envrc.local actually needs (comments included).
        entry: scripts/check-envrc-local-example.sh
        language: system
        stages: [pre-commit, pre-push]
        always_run: true
        pass_filenames: false

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^linux/.*\.sh$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
