name: PR code review (advisory)

# Advisory code review of the PR diff by a NON-Anthropic model — a different
# model's eyes than the Claude that planned and implemented the change (see
# docs/adr/0025). Deliberately NOT a required status check: an LLM reviewer
# false-positives, and a rate-limit or outage must never block a merge, so
# human approval stays the gate. Scoped to `architecture`-labeled PRs to
# bound cost.
#
# The reviewer targets any OpenAI-compatible chat-completions endpoint, set by
# OPENAI_API_URL / OPENAI_MODEL below. It currently points at OpenRouter's free
# tier (a free open model) to trial the reviewer at $0. To move to the OpenAI
# API, drop those two env lines (run.mjs defaults to gpt-4o-mini on
# api.openai.com) and put an OpenAI key in the secret instead. Either way the
# key lives in the `OPENAI_API_KEY` repo secret — provision it with the elevated
# session, same pattern as RELEASE_PAT. Without it the job skips cleanly
# (green), it doesn't fail.
#
# DIY step (scripts/pr-review/), not a third-party Action: #330's upgrade
# over the anc95/ChatGPT-CodeReview action this replaced. That action
# batched comments per file with no real suggestion-block anchoring, so its
# `suggestion` blocks posted as copy-pasteable code, not GitHub's
# one-click-applyable kind (those need exact per-line anchoring via
# pulls.createReview's `comments` array). scripts/pr-review/run.mjs calls
# the GitHub REST API and an OpenAI-compatible chat API directly — no
# third-party Action holding the key or reading the diff — and posts real
# per-line suggestions. See
# scripts/pr-review/build-review.test.mjs for its unit-tested logic and the
# PR discussion for #330 for the design tradeoffs (file/prompt-size caps,
# single-line-only suggestions).

on:
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'architecture')
    runs-on: ubuntu-latest
    steps:
      - name: Check for the review API key
        id: guard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not set — advisory review skipped." >&2
            echo "enabled=false" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          node-version: "20"
      - name: Advisory review
        if: steps.guard.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # OpenRouter free tier (see header note to switch to the OpenAI API).
          # The free model lineup rotates — if this ID 404s, pick another from
          # openrouter.ai/models?supported_parameters=structured_outputs (must
          # keep structured_outputs support). Alternate: openai/gpt-oss-20b:free.
          OPENAI_API_URL: https://openrouter.ai/api/v1/chat/completions
          OPENAI_MODEL: nvidia/nemotron-3-super-120b-a12b:free
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/pr-review/run.mjs
