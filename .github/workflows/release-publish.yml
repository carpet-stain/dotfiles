name: Publish release

# Triggers on the PR's own close event rather than the resulting push, and
# gates on the PR's actual head branch name (structural metadata) rather
# than the squash-commit message text. A push-based trigger checking
# commit-message text is fragile: GitHub lets you edit the squash-commit
# message in the merge confirmation box regardless of what the PR title
# said, so a push-triggered check could silently no-op on a genuine
# release, or fire on something it shouldn't. head.ref isn't editable at
# merge time, so gating on it here doubles as the verification step this
# workflow used to need separately.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    name: tag and publish release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    steps:
      # Explicit ref: main — pull_request-triggered checkouts default to a
      # synthetic merge-preview ref, not main's actual post-merge state,
      # and we're about to tag real history.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "version=${HEAD_REF#release/}" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      # Mirrors this repo's documented manual step:
      # `git cliff --tag vX.Y.Z --latest --strip all`
      - name: Extract this release's notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.version }} --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md

      - name: Delete the ephemeral release branch
        run: git push origin --delete "${{ github.event.pull_request.head.ref }}"

      # dev's reset onto main is handled by sync-dev.yml for every merge,
      # release or not — not duplicated here.
