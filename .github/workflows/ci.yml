name: CI

# Gate merges into main: run on every PR targeting it (fires on each new push
# to the PR's branch too).
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    # Draft PRs open early and take WIP pushes; a skipped-via-if job reads as
    # passing to required-status-check branch protection, not failing, so
    # this stays quiet until ready_for_review re-triggers it for real. Same
    # shape as pr-guards.yml (job-level, not workflow-level — see #208).
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships Homebrew already; this just puts it on PATH, so
      # CI installs the exact same formulae/versions as macos/deploy.zsh and
      # a contributor's local machine — one tool list, not a second one
      # re-declared in apt/npm/go-install form.
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # No bottle cache. Linuxbrew binaries reference a patched ELF loader under
      # the .linuxbrew prefix, which lives outside the Cellar; caching just the
      # Cellar (as we did) restores binaries whose interpreter is missing —
      # `just: cannot execute: required file not found`, exit 127. Two prior
      # patches (#285 relink, #286 image-scoped key) treated symptoms; a fresh
      # install is the only reliable form and links correctly on its own. It's
      # ~48s (#124), the cost #276's Homebrew-free rewrite removes for good.
      - name: Install lint/format tools
        run: |
          brew install just lefthook zsh shellcheck actionlint shfmt stylua \
            selene taplo yamlfmt markdownlint-cli2 prettier

      # `just lint` is the same entry point contributors run (it wraps
      # `lefthook run pre-commit --all-files`), so CI and local share one
      # command and can't drift. lefthook.yml stays the source of truth for
      # which checks run; --no-tty passes through the recipe for CI.
      - name: Run lint/format checks
        run: just lint --no-tty
