name: CI

# Gate merges into main: run on every PR targeting it (fires on each new push
# to the PR's branch too).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zsh-syntax:
    name: zsh syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gate expensive steps on whether any zsh files actually changed.
      # Using an in-job filter (rather than a top-level paths: trigger) keeps
      # the job always-green for non-zsh PRs, satisfying required-status checks.
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            zsh:
              - 'zsh/**'
              - '**/*.zsh'
              - 'macos/deploy.zsh'

      - name: Install zsh
        if: steps.filter.outputs.zsh == 'true'
        run: sudo apt-get update && sudo apt-get install -y zsh

      # zsh -n parses without executing, so missing tools/submodules don't matter.
      - name: Syntax-check zsh files
        if: steps.filter.outputs.zsh == 'true'
        run: |
          fail=0
          files=(
            zsh/.zshenv
            zsh/.zshrc
            zsh/rc.d/*.zsh
            zsh/env.d/*.zsh
            zsh/fpath/*
            macos/deploy.zsh
          )
          for f in "${files[@]}"; do
            [ -f "$f" ] || continue
            if zsh -n "$f"; then
              echo "ok: $f"
            else
              echo "::error file=$f::zsh -n failed"
              fail=1
            fi
          done
          exit $fail
