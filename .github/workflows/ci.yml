name: CI

# Gate merges into main: run on every PR targeting it (fires on each new push
# to the PR's branch too).
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    # Draft PRs open early and take WIP pushes; a skipped-via-if job reads as
    # passing to required-status-check branch protection, not failing, so
    # this stays quiet until ready_for_review re-triggers it for real. Same
    # shape as pr-guards.yml (job-level, not workflow-level — see #208).
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships Homebrew already; this just puts it on PATH, so
      # CI installs the exact same formulae/versions as macos/deploy.zsh and
      # a contributor's local machine — one tool list, not a second one
      # re-declared in apt/npm/go-install form.
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # setup-homebrew caches Ruby gems only, not installed bottles, so the
      # 11-formula install re-downloads/-links from scratch every run (~48s,
      # ~77% of this job — see #124). Resolve the Cellar + bottle-download
      # paths at runtime rather than hardcoding the linuxbrew layout.
      - name: Resolve Homebrew cache paths
        id: brew-paths
        run: |
          echo "cellar=$(brew --cellar)" >> "$GITHUB_OUTPUT"
          echo "cache=$(brew --cache)" >> "$GITHUB_OUTPUT"

      # Keyed on ci.yml (which holds the formula list): a tool add/bump edits
      # this file, changes the key, and forces a correct fresh download —
      # self-invalidating.
      - name: Cache Homebrew Cellar and bottles
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.brew-paths.outputs.cellar }}
            ${{ steps.brew-paths.outputs.cache }}
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            brew-${{ runner.os }}-

      # The cache restores the Cellar but not the bin/ symlinks, and `brew
      # install` only WARNS on a present-but-unlinked keg instead of relinking
      # it — an exact-key cache hit therefore left every tool off PATH
      # (`just: command not found`). Relink explicitly; on a fresh install the
      # links already exist and --overwrite is a no-op.
      - name: Install lint/format tools
        run: |
          brew install just lefthook zsh shellcheck actionlint shfmt stylua \
            selene taplo yamlfmt markdownlint-cli2 prettier
          brew link --overwrite just lefthook zsh shellcheck actionlint shfmt \
            stylua selene taplo yamlfmt markdownlint-cli2 prettier

      # `just lint` is the same entry point contributors run (it wraps
      # `lefthook run pre-commit --all-files`), so CI and local share one
      # command and can't drift. lefthook.yml stays the source of truth for
      # which checks run; --no-tty passes through the recipe for CI.
      - name: Run lint/format checks
        run: just lint --no-tty
