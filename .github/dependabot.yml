version: 2
updates:
  # zsh plugins — scope: zsh
  - package-ecosystem: "gitsubmodule"
    directory: "/zsh/plugins"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(zsh)"
    labels:
      - "dependencies"

  # Catppuccin theme submodules — scope: theme
  - package-ecosystem: "gitsubmodule"
    directory: "/theme"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(theme)"
    labels:
      - "dependencies"

  # actions used in .github/workflows/*.yml — scope: ci
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
